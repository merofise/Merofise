<!-- 🔥 SUPABASE + FUNCIONALIDAD REAL MEROFISE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ==============================
// 🔗 CONEXIÓN SUPABASE (TUYA)
// ==============================
const SUPABASE_URL = "https://xfdwygufboazyshcrxwn.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmZHd5Z3VmYm9henlzaGNyeHduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyNDQwNDcsImV4cCI6MjA5MTgyMDA0N30.jphnwycmmv2auhWFGI8NPO2ov8BraNdmyr4Om1zTkwQ";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ==============================
// 🔐 REGISTER
// ==============================
async function register() {
  const email = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) {
    showError(error.message);
  } else {
    showSuccess("Usuario registrado correctamente 🚀");
  }
}

// ==============================
// 🔐 LOGIN
// ==============================
async function login() {
  const email = document.getElementById("authEmail").value;
  const password = document.getElementById("authPassword").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    showError(error.message);
  } else {
    showSuccess("Login correcto ✅");
    loadProperties();
  }
}

// ==============================
// 🏠 PUBLICAR PROPIEDAD
// ==============================
async function publishProperty(event) {
  event.preventDefault();

  const form = new FormData(event.target);
  const { data: userData } = await supabaseClient.auth.getUser();

  if (!userData.user) {
    showError("Debes iniciar sesión primero");
    return;
  }

  const { error } = await supabaseClient.from("properties").insert([
    {
      owner_id: userData.user.id,
      title: form.get("title"),
      price: form.get("price"),
      location: form.get("location"),
      description: form.get("description"),
      images: [form.get("image_url")]
    }
  ]);

  if (error) {
    showError(error.message);
  } else {
    showSuccess("Propiedad publicada 🚀");
    loadProperties();
  }
}

// ==============================
// 📊 CARGAR PROPIEDADES
// ==============================
async function loadProperties() {
  const { data, error } = await supabaseClient
    .from("properties")
    .select("*");

  const container = document.getElementById("propertiesGrid");
  if (!container) return;

  container.innerHTML = "";

  if (data && data.length > 0) {
    data.forEach(p => {
      container.innerHTML += `
        <div class="glass-panel p-4 rounded-xl">
          <img src="${p.images?.[0] || 'https://via.placeholder.com/400'}" class="w-full h-40 object-cover rounded mb-2">
          <h3 class="text-white font-bold">${p.title}</h3>
          <p class="text-green-400">${p.price}€</p>
          <p class="text-sm text-slate-400">${p.location}</p>
        </div>
      `;
    });
  } else {
    container.innerHTML = "<p class='text-slate-400'>No hay propiedades aún</p>";
  }
}

// ==============================
// 🎯 MENSAJES
// ==============================
function showError(msg) {
  const el = document.getElementById("authError");
  if (!el) return;
  el.innerText = msg;
  el.classList.remove("hidden");
}

function showSuccess(msg) {
  const el = document.getElementById("authSuccess");
  if (!el) return;
  el.innerText = msg;
  el.classList.remove("hidden");
}

// ==============================
// 🚀 AUTO START
// ==============================
window.addEventListener("load", loadProperties);
</script>
